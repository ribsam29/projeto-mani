<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lendas Indígenas</title>

  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <main class="container">

    <div class="card">

      <!-- HEADER -->
      <div class="card-header">
        <span class="eyebrow">Lenda Indígena</span>
        <h1>🌿 Lenda da Mani</h1>
      </div>

      <!-- IMAGEM -->
      <figure class="card-media">
        <img id="imagem" src="https://static.todamateria.com.br/upload/le/nd/lendadamandioca2.jpg" alt="Imagem da lenda">
      </figure>

      <!-- HISTÓRIA -->
      <div class="card-content">
        <p id="texto" class="story-text"></p>

        <div class="progress-bar">
          <div id="progress" class="progress-fill"></div>
        </div>
      </div>

            <!-- BOTÃO -->
      <div class="card-actions">
        <button id="actionButton">Próxima parte</button>
      </div>

      <!-- INFO (EMBAIXO COMO TU QUERIA) -->
      <section class="info-panel">
        <h2>Sobre a Lenda</h2>

        <p id="infoText"></p>

        <p>
         <a id="videoLink" href="#" target="_blank">
            Assistir vídeo da lenda
         </a>
        </p>
      </section>


    </div>

  </main>

  <script src="../javascript/script.js"></script>

</body>
</html>
